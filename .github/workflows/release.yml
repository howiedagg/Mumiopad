name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: '發布版本號 (輸入 "auto" 自動累加，或手動輸入特定版本號如 v1.0.0)'
        required: true
        default: 'auto'
      changelog:
        description: '更新日誌 (支援 Markdown，可列點說明)'
        required: true
        default: |
          - Fixed known issues
          - Optimize performance and connection

jobs:
  # 任務一：自動解析或計算版本號
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: 檢出專案代碼
        uses: actions/checkout@v4

      - name: 確定版本號
        id: get_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT_VER="${{ github.event.inputs.version_name }}"
          
          if [ "$INPUT_VER" = "auto" ] || [ -z "$INPUT_VER" ]; then
            # 1. 嘗試從 GitHub 獲取最新的 Release 標籤，若無任何發布過，則預設為 v0.0.0
            LATEST_TAG=$(gh release view --json tagName --template '{{.tagName}}' 2>/dev/null || echo "v0.0.0")
            echo "偵測到目前的最新版本號為: $LATEST_TAG"
            
            # 2. 使用 Python 解析並依「個位數滿 9 進位」規則自動 +1
            NEXT_TAG=$(python3 <<'EOF'
          import sys
          tag = '$LATEST_TAG'.lstrip('v')
          try:
              parts = list(map(int, tag.split('.')))
              if len(parts) != 3: raise ValueError
          except:
              parts = [0, 0, 0]
          
          parts[2] += 1
          if parts[2] > 9:
              parts[2] = 0
              parts[1] += 1
              if parts[1] > 9:
                  parts[1] = 0
                  parts[0] += 1
          print(f"v{parts[0]}.{parts[1]}.{parts[2]}")
          EOF
            )
            
            # 去除可能帶有的前後空白
            NEXT_TAG=$(echo "$NEXT_TAG" | tr -d '[:space:]')
            echo "自動計算出下一個版本號為: $NEXT_TAG"
            echo "version=$NEXT_TAG" >> $GITHUB_OUTPUT
          else
            # 3. 使用者手動輸入，確保有補上 v 開頭
            if [[ ! "$INPUT_VER" =~ ^v ]]; then
              INPUT_VER="v$INPUT_VER"
            fi
            echo "使用使用者手動指定的版本號: $INPUT_VER"
            echo "version=$INPUT_VER" >> $GITHUB_OUTPUT
          fi

  # 任務二：建置 Android APK
  build-apk:
    runs-on: ubuntu-latest
    needs: resolve-version
    steps:
      - name: 檢出專案代碼
        uses: actions/checkout@v4

      - name: 設定 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 設定 Android SDK
        uses: android-actions/setup-android@v3

      - name: 賦予 Gradle 執行權限
        run: chmod +x android-app/gradlew

      - name: 建置 Android 試用版 APK
        run: |
          cd android-app
          ./gradlew assembleDebug

      - name: 暫存 APK 檔案
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

  # 任務三：在 Windows 環境下編譯 Python 伺服器為 .exe 執行檔
  build-server-windows:
    runs-on: windows-latest
    needs: resolve-version
    steps:
      - name: 檢出專案代碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝相依套件與打包工具
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller websockets pynput zeroconf pystray Pillow

      - name: 使用 PyInstaller 編譯為獨立 Exe
        run: |
          cd pc-server-python
          pyinstaller --onefile --noconsole --name MumiopadServer server.py

      - name: 暫存 Server Exe 檔案
        uses: actions/upload-artifact@v4
        with:
          name: pc-server-exe
          path: pc-server-python/dist/MumiopadServer.exe

  # 任務四：統合前述任務的成品，並發布至 Release
  create-release:
    runs-on: ubuntu-latest
    needs: [resolve-version, build-apk, build-server-windows]
    permissions:
      contents: write
    steps:
      - name: 下載 APK 暫存檔
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./apk-output

      - name: 下載 Server 暫存檔
        uses: actions/download-artifact@v4
        with:
          name: pc-server-exe
          path: ./server-output

      - name: 整理上傳檔名
        run: |
          mv ./apk-output/app-debug.apk ./Mumiopad-${{ needs.resolve-version.outputs.version }}.apk
          mv ./server-output/MumiopadServer.exe ./MumiopadServer-${{ needs.resolve-version.outputs.version }}.exe

      - name: 建立 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.version }}
          name: Mumiopad ${{ needs.resolve-version.outputs.version }}
          body: ${{ github.event.inputs.changelog }}
          draft: false
          prerelease: false
          files: |
            Mumiopad-${{ needs.resolve-version.outputs.version }}.apk
            MumiopadServer-${{ needs.resolve-version.outputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}