name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: '發布版本號 (例如: v1.0.0)'
        required: true
        default: 'v1.0.0'
      changelog:
        description: '更新日誌 (支援 Markdown，可列點說明)'
        required: true
        default: |
          - Fixed known issues
          - Optimize performance and connection stability

jobs:
  # 任務一：建置 Android APK
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出專案代碼
        uses: actions/checkout@v4

      - name: 設定 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 設定 Android SDK
        uses: android-actions/setup-android@v3

      - name: 賦予 Gradle 執行權限
        run: chmod +x android-app/gradlew

      - name: 建置 Android 試用版 APK
        run: |
          cd android-app
          ./gradlew assembleDebug

      - name: 暫存 APK 檔案
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

  # 任務二：在 Windows 環境下編譯 Python 伺服器為 .exe 執行檔
  build-server-windows:
    runs-on: windows-latest
    steps:
      - name: 檢出專案代碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝相依套件與打包工具
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller websockets pynput zeroconf pystray Pillow

      - name: 使用 PyInstaller 編譯為獨立 Exe
        run: |
          cd pc-server-python
          pyinstaller --onefile --noconsole --name MumiopadServer server.py

      - name: 暫存 Server Exe 檔案
        uses: actions/upload-artifact@v4
        with:
          name: pc-server-exe
          path: pc-server-python/dist/MumiopadServer.exe

  # 任務三：統合前兩個任務的成品，並發布至 Release
  create-release:
    runs-on: ubuntu-latest
    needs: [build-apk, build-server-windows]
    permissions:
      contents: write
    steps:
      - name: 下載 APK 暫存檔
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./apk-output

      - name: 下載 Server 暫存檔
        uses: actions/download-artifact@v4
        with:
          name: pc-server-exe
          path: ./server-output

      - name: 整理上傳檔名
        run: |
          mv ./apk-output/app-debug.apk ./Mumiopad-${{ github.event.inputs.version_name }}.apk
          mv ./server-output/MumiopadServer.exe ./MumiopadServer-${{ github.event.inputs.version_name }}.exe

      - name: 建立 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_name }}
          name: Mumiopad ${{ github.event.inputs.version_name }}
          body: ${{ github.event.inputs.changelog }}
          draft: false
          prerelease: false
          files: |
            Mumiopad-${{ github.event.inputs.version_name }}.apk
            MumiopadServer-${{ github.event.inputs.version_name }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}